modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Morikemuri/stutter-analyzer/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/Morikemuri/stutter-analyzer"
logoFile="stutteranalyzer_icon.png"
authors="${mod_authors}"
